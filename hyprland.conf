# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgb(6E89C2)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# Tag foot as a terminal (Omarchy's default tag only covers Alacritty/kitty/ghostty).
windowrule = tag +terminal, match:class foot

# Terminal opacity — overrides Omarchy's default 0.97/0.9 on tag `terminal`.
# Transparency comes from the terminal's own config (so text stays crisp);
# this rule adds a slight extra fade on inactive terminal panes.
# Non-terminal apps keep Omarchy's subtle default opacity.
windowrule = opacity 1.0 0.88, match:tag terminal
