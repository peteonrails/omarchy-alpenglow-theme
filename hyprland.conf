# This file is not a full hyprland configuration.
# It is intended to be included in your main hyprland.conf.

$activeBorderColor = rgb(6E89C2)

general {
    col.active_border = $activeBorderColor
}

group {
    col.border_active = $activeBorderColor
}

# Terminal-only opacity.
# Browsers, Discord, 1Password, etc. stay fully opaque. Terminals get a subtle
# transparent background (set in each terminal's own config so text stays crisp),
# plus a window-level fade on inactive panes for that extra "background" feel.
# Overrides Omarchy's default opacity rule on tag `terminal`.
windowrule = opacity 1.0 0.85, match:tag terminal
